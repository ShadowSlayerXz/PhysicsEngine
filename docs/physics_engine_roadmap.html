
<style>
  .phase { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); margin-bottom: 20px; overflow: hidden; }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
  .phase-header:hover { background: var(--color-background-secondary); }
  .phase-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .phase-title { font-size: 15px; font-weight: 500; flex: 1; }
  .phase-time { font-size: 12px; color: var(--color-text-tertiary); white-space: nowrap; }
  .chevron { font-size: 16px; color: var(--color-text-tertiary); transition: transform .25s; }
  .phase-body { border-top: 0.5px solid var(--color-border-tertiary); display: none; }
  .phase-body.open { display: block; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .task:last-child { border-bottom: none; }
  .task-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .task-name { font-size: 13px; font-weight: 500; margin: 0; }
  .task-desc { font-size: 12px; color: var(--color-text-secondary); margin: 2px 0 0; line-height: 1.5; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-left: 6px; vertical-space: middle; }
  .current-label { font-size: 11px; background: var(--color-background-success); color: var(--color-text-success); border-radius: 12px; padding: 2px 9px; }
  .progress-bar { height: 3px; background: var(--color-border-tertiary); border-radius: 2px; margin: 0 18px 14px; }
  .progress-fill { height: 100%; border-radius: 2px; }
  p { margin: 0; }
</style>

<h2 class="sr-only">Physics engine development roadmap — 6 phases from current particle simulation to full 3D engine</h2>

<div style="display:flex; align-items:center; gap:10px; margin-bottom:18px; padding:0 2px">
  <span style="font-size:13px; color:var(--color-text-secondary)">Click a phase to expand</span>
  <span class="current-label">● You are here — Phase 1</span>
</div>

<div id="phases"></div>

<script>
const phases = [
  {
    num: 1,
    title: "Core 2D fundamentals",
    time: "Now — 2 weeks",
    color: "#534AB7", bg: "#EEEDFE", borderColor: "#AFA9EC",
    dotColor: "#534AB7",
    progress: 40,
    current: true,
    tasks: [
      { name: "Fixed timestep loop", desc: "You already have DT=1/480. Extract physics update into its own function, separate from rendering.", tag: "done" },
      { name: "Multiple particles", desc: "Replace single `ball` with a `std::vector<Particle>`. Add a simple spawner (click to spawn).", tag: "next" },
      { name: "AABB & wall collisions", desc: "Detect and resolve collisions with all 4 window edges, not just the floor.", tag: "next" },
      { name: "Friction & damping", desc: "Add linear drag coefficient and horizontal friction on ground contact.", tag: "next" },
    ]
  },
  {
    num: 2,
    title: "Particle–particle collisions",
    time: "2 – 5 weeks",
    color: "#0F6E56", bg: "#E1F5EE", borderColor: "#5DCAA5",
    dotColor: "#1D9E75",
    progress: 0,
    tasks: [
      { name: "Broadphase: spatial grid", desc: "Divide world into cells; only check pairs in the same or adjacent cells. O(n) instead of O(n²)." },
      { name: "Circle–circle detection", desc: "Distance vs radius sum. Store collision manifold: normal, penetration depth, contact point." },
      { name: "Impulse resolution", desc: "Apply mass-weighted velocity impulses along the collision normal using restitution." },
      { name: "Positional correction", desc: "Push overlapping circles apart to prevent sinking (Baumgarte stabilisation)." },
    ]
  },
  {
    num: 3,
    title: "Rigid body dynamics",
    time: "5 – 10 weeks",
    color: "#185FA5", bg: "#E6F1FB", borderColor: "#85B7EB",
    dotColor: "#185FA5",
    progress: 0,
    tasks: [
      { name: "Angular state", desc: "Add `angle`, `angularVelocity`, and `momentOfInertia` to each body. Integrate rotation each step." },
      { name: "Torque from collisions", desc: "Use contact point offset from center of mass to compute torque contribution during impulse." },
      { name: "Polygon shapes", desc: "Support convex polygons alongside circles using the Separating Axis Theorem (SAT)." },
      { name: "Static / kinematic bodies", desc: "Infinite-mass bodies (floors, walls, moving platforms) that don't respond to forces." },
    ]
  },
  {
    num: 4,
    title: "Constraints & joints",
    time: "10 – 18 weeks",
    color: "#BA7517", bg: "#FAEEDA", borderColor: "#EF9F27",
    dotColor: "#BA7517",
    progress: 0,
    tasks: [
      { name: "Distance constraint", desc: "Keep two anchor points a fixed length apart. Foundation for all joints." },
      { name: "Revolute joint", desc: "Pin two bodies together at a point (e.g. door hinge, ragdoll limbs)." },
      { name: "Spring & damper", desc: "Hooke's law force applied between anchor pairs. Great for soft bodies." },
      { name: "Sequential impulse solver", desc: "Iterative constraint solver (Box2D style). Solves all constraints each frame until convergence." },
    ]
  },
  {
    num: 5,
    title: "Broad optimisations & scene",
    time: "18 – 26 weeks",
    color: "#993C1D", bg: "#FAECE7", borderColor: "#F0997B",
    dotColor: "#D85A30",
    progress: 0,
    tasks: [
      { name: "Sleep / wake system", desc: "Deactivate bodies with tiny velocity for several frames. Huge perf win for dense scenes." },
      { name: "BVH or AABB tree", desc: "Dynamic bounding-volume hierarchy for large scenes (100s–1000s of bodies)." },
      { name: "Scene serialisation", desc: "Save / load world state as JSON or binary. Lets you build test scenes quickly." },
      { name: "Debug overlay", desc: "SFML draw calls that show contact points, velocity vectors, AABBs, and sleep state." },
    ]
  },
  {
    num: 6,
    title: "3D extension (optional path)",
    time: "26+ weeks",
    color: "#5F5E5A", bg: "#F1EFE8", borderColor: "#B4B2A9",
    dotColor: "#888780",
    progress: 0,
    tasks: [
      { name: "3D vector & matrix math", desc: "Replace vector2 with glm::vec3/mat3/quat. Add an inertia tensor to rigid bodies." },
      { name: "GJK collision detection", desc: "Gilbert–Johnson–Keerthi for arbitrary convex shapes in 3D. Replaces SAT." },
      { name: "EPA for penetration depth", desc: "Expanding Polytope Algorithm — finds the MTD vector from a GJK simplex." },
      { name: "OpenGL / Vulkan renderer", desc: "Swap SFML for a proper 3D renderer, or use it as a headless library." },
    ]
  }
];

const tags = { done: ["Mostly done", "#1D9E75", "#E1F5EE"], next: ["Up next", "#185FA5", "#E6F1FB"] };

const container = document.getElementById('phases');

phases.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'phase';
  el.style.border = `0.5px solid ${p.borderColor}`;

  const tagHTML = p.current ? `<span class="current-label">● Current</span>` : '';

  const tasksHTML = p.tasks.map(t => {
    let tagEl = '';
    if (t.tag && tags[t.tag]) {
      const [label, color, bg] = tags[t.tag];
      tagEl = `<span class="tag" style="background:${bg};color:${color}">${label}</span>`;
    }
    return `<div class="task">
      <div class="task-dot" style="background:${p.dotColor}"></div>
      <div>
        <p class="task-name">${t.name}${tagEl}</p>
        <p class="task-desc">${t.desc}</p>
      </div>
    </div>`;
  }).join('');

  const progressHTML = p.progress > 0
    ? `<div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%;background:${p.dotColor}"></div></div>`
    : '';

  el.innerHTML = `
    <div class="phase-header" onclick="toggle(${i})">
      <span class="phase-badge" style="background:${p.bg};color:${p.color}">Phase ${p.num}</span>
      <span class="phase-title">${p.title}</span>
      ${tagHTML}
      <span class="phase-time">${p.time}</span>
      <span class="chevron" id="chev-${i}"><i class="ti ti-chevron-down" aria-hidden="true"></i></span>
    </div>
    <div class="phase-body${p.current ? ' open' : ''}" id="body-${i}">
      ${progressHTML}
      ${tasksHTML}
    </div>`;
  container.appendChild(el);
});

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const chev = document.getElementById('chev-' + i);
  const open = body.classList.toggle('open');
  chev.style.transform = open ? 'rotate(180deg)' : '';
}
</script>
